- title: "Climate Inequality: Carbon Capture for Redistribution"
  venue: CESifo WP 11239
  coauthors: with Elisa Belfiori (UTDT)
  pdf: cesifo1_wp11239.pdf
  snapshot: cesifo1_wp11239.png
  abstract: >
    We study optimal climate policy in a global economy where regions differ in wealth and
    climate vulnerability. The model with heterogeneity can be cast into a representative-region
    economy with a different discount factor and damage function, giving a simple rule to
    account for inequality in climate policy design. Wealthier regions should bear more
    responsibility for carbon capture; carbon capture also serves as a redistribution tool
    when direct transfers across regions are unfeasible.

- title: Policy during Hyperinflations
  venue: ""
  coauthors: with Albert Marcet and Juan Pablo Nicolini
  pdf: policy_during_hypers.pdf
  snapshot: policy_during_hypers.png
  abstract: >
    We perform policy analysis in a macroeconomic model in which agents do not have rational
    expectations, using hyperinflation episodes as a laboratory. We focus on policies that fix
    the exchange rate to reduce inflation and stabilize the economy, computing the external
    financing requirements and welfare gains of alternative policies. Early and fast
    interventions are preferable on welfare grounds but require more access to external funds.


- title: On the Risk of Leaving the Euro
  venue: FRB Minneapolis WP 760
  coauthors: with Albert Marcet and Juan Pablo Nicolini
  pdf: wp760.pdf
  snapshot: wp760.png
  abstract: >
    Following the sovereign debt crisis of 2012, some southern European countries debated
    proposals to leave the Euro. We evaluate this policy change in a standard monetary model
    with seigniorage financing of the deficit, departing from rational expectations while
    maintaining full rationality of agents. Small departures from rational expectations imply
    that inflation upon exit can be orders of magnitude higher than under rational expectations.

- title: Credit Crises and Private Deleveraging
  venue: ""
  coauthors: ""
  pdf: deleveraging.pdf
  snapshot: deleveraging.png
  abstract: >
    Private debt shrinks sharply after financial crises, but households' and firms' deleveraging
    have typically been studied in isolation. I study the aggregate effects of private
    deleveraging in an economy with two-sided heterogeneity and a housing market, showing the
    response of the economy to credit crises depends crucially on the financial asset position
    of the productive sector — a statistic calculable directly from aggregate data.
